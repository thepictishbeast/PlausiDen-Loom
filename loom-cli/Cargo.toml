[package]
name = "loom-cli"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "PlausiDen-Loom: top-level CLI. `loom lint`, `loom audit`, `loom new`, `loom tokens`."

[[bin]]
name = "loom"
path = "src/main.rs"

[dependencies]
loom-cms-render = { path = "../loom-cms-render", version = "0.1" }
loom-lint = { path = "../loom-lint", version = "0.1" }
loom-tokens = { path = "../loom-tokens", version = "0.1" }
clap = { workspace = true }
anyhow = { workspace = true }
serde_json = { workspace = true }
sha2 = "0.10"
base64 = "0.22"
toml = "0.8"
toml_edit = "0.22"

[lints]
workspace = true
