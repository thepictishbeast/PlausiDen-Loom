name: ci

# fmt + clippy + doc gates. Tests run via tarpaulin in coverage.yml,
# which fails the workflow on any test failure (--fail-under is 0
# only for the coverage percentage, not for the test pass).

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest

    env:
      RUST_BACKTRACE: 1
      RUST_LOG: info
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check --verbose

  clippy:
    name: clippy
    runs-on: ubuntu-latest

    env:
      RUST_BACKTRACE: 1
      RUST_LOG: info
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --workspace --all-targets --locked --verbose

  doc:
    name: doc
    runs-on: ubuntu-latest

    env:
      RUST_BACKTRACE: 1
      RUST_LOG: info
      CARGO_TERM_COLOR: always    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo doc --workspace --no-deps --locked --verbose
