# ──────────────────────────────────────────────────────────────
# Notes on coverage
# ──────────────────────────────────────────────────────────────
#
# This manifest covers the highest-leverage primitives — the
# editorial body set (Paragraph / Heading / PullQuote / Epigraph /
# KvPair / Code), the three hero shapes (Hero / ImageHero /
# SplitHero), the major composition primitives (FeatureSpotlight /
# StatBand / Steps / Faq / LogoWall / CallToAction / Pricing), and
# the canonical Interactive primitives (Form / AccordionGroup /
# Tabs).
#
# `loom-cms-render` carries ~40+ additional variants
# (AccountSummary / Banner / CardFeed / Composer / Container /
# Divider / GridLayout / Group / LegalDoc / Marginalia / Marquee /
# Picture / ProfileEdit / Reveal / SettingsPanel / Sidebar /
# Spacer / Stack / Cluster / Columns / etc).
#
# Per [[backward-compat-version-discipline]] Cat-2 additive: new
# primitive declarations land additively as each variant is
# audited + classified. Until then, those variants don't appear in
# the manifest — Forge's trait_consistency phase only audits
# declared entities.

