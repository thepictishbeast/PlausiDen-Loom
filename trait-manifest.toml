# trait-manifest.toml — typed trait declarations for Loom primitives.
#
# Per AVP-Doctrine TRAIT_DAG.md + the Forge `trait_consistency` +
# `trait_implications` phases (PlausiDen-Forge tasks #171 + #169):
# every substrate-managed entity (Loom primitive, CMS section,
# Forge phase, Crawler detector, *-core type) declares which
# traits it satisfies via this manifest.
#
# Forge reads this file on `forge build` and emits strict findings
# for any entity that omits a default-required trait per its
# entity_class.
#
# Schema:
#   [meta] schema_version = "1.0.0"
#   [[projections]]
#     entity_id     = "Loom.Primitive.<Variant>"      (matches CmsSection variant identity)
#     entity_class  = "loom_visible_primitive"        (or _interactive_primitive / cms_section / ...)
#     traits        = ["...", ...]                    (kebab-case slugs per loom_traits::Trait)
#
# Closes #168 [trait-v3]. The 8 default-required traits per
# rule prim-001 + TRAIT_DAG.md § Default-required for
# Loom.Primitive.Visible:
#   mobile-friendly / rtl-aware / reduced-motion-aware /
#   theme-aware / no-site-specific / manifested / versioned /
#   doctrine-cited
#
# Interactive lineage adds: focusable / keyboard-operable /
# screen-reader-accessible.

schema_version = "1.0.0"

