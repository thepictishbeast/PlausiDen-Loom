[graph]
all-features = true

[advisories]
yanked = "deny"
ignore = [
  # SHIP-DECISION: 2026-05-17 wda — RUSTSEC-2023-0071 (Marvin Attack
  # on `rsa` crate) pulled in transitively by russh-keys → ssh-key.
  # `rsa` 0.9.x has no fixed upgrade available and no russh feature
  # flag strips it from the dep graph (rsa is unconditional in
  # ssh-key).
  #
  # Accepted residual risk: the loom-bridge SSH transport is opt-in
  # behind the `russh-transport` feature (default = []) and the T46
  # design pins client auth to ed25519 keys only — no RSA codepath is
  # exercised at runtime. Marvin requires the attacker to observe RSA
  # timings on the network; with the RSA path unused, the attack
  # surface is zero in practice.
  #
  # SECURITY: this ignore MUST be re-evaluated whenever russh / russh-
  # keys / ssh-key gets a release that either drops the rsa dep or
  # picks up a constant-time alternative, AND on any expansion of
  # loom-bridge transport beyond ed25519-only auth.
  "RUSTSEC-2023-0071",
]

[licenses]
# AGPL-3.0-or-later covers the Loom workspace itself (license declared
# in the workspace package metadata). Upstream deps are limited to
# the permissive set below.
allow = [
  "AGPL-3.0-or-later",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "MIT",
  "MIT-0",
  "MPL-2.0",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "Zlib",
  "CC0-1.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
